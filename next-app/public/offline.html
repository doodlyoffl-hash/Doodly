<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline · DOODLY</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #EAF6EE 0%, #FBFCFA 60%); color: #0F3D2E;
    }
    .card { max-width: 420px; text-align: center; }
    .drop { width: 72px; height: 72px; margin: 0 auto 20px; display: grid; place-items: center;
      border-radius: 50%; background: linear-gradient(135deg, #1FAE66, #0F3D2E); }
    h1 { font-size: 1.6rem; margin: 0 0 8px; }
    p { color: #5E7167; line-height: 1.6; margin: 0 0 24px; }
    button { border: 0; cursor: pointer; font: inherit; font-weight: 700; color: #fff;
      background: #1FAE66; padding: 12px 24px; border-radius: 999px; transition: transform .15s; }
    button:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="drop">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
        <path d="M12 3s6 6.5 6 10.5a6 6 0 0 1-12 0C6 9.5 12 3 12 3Z" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>The freshest milk needs a connection. Check your network and try again — your basket is safe.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
